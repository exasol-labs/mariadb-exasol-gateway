name: Build MariaDB plugin package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version without a leading v
        required: true
        default: 0.1.0-dev
        type: string
      release_tag:
        description: Optional GitHub Release tag to create from this run (for example v0.1.0)
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  build-package:
    runs-on: ubuntu-24.04
    env:
      MARIADB_VERSION: '11.4.9'
      PLATFORM: ubuntu-24.04
      ARCH: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: exasol-labs/exasol-gateway-sdk
          path: exasol-gateway-sdk
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bison ca-certificates cmake flex g++ gcc git libaio-dev libcurl4-openssl-dev \
            libevent-dev libgtest-dev libncurses-dev libssl-dev libxml2-dev lsb-release \
            ninja-build pkg-config wget zlib1g-dev
          wget --quiet "https://packages.apache.org/artifactory/arrow/ubuntu/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install --yes ./apache-arrow-apt-source-latest-*.deb
          sudo apt-get update
          sudo apt-get install --yes libarrow-dev
      - name: Build and run available SDK unit tests
        run: |
          cmake -S exasol-gateway-sdk -B build-sdk -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/sdk-install" \
            '-DCMAKE_INSTALL_RPATH=$ORIGIN'
          cmake --build build-sdk
          ctest --test-dir build-sdk --output-on-failure
          cmake --install build-sdk
      - name: Check out supported MariaDB source
        run: |
          git clone --depth 1 --branch "mariadb-${MARIADB_VERSION}" \
            https://github.com/MariaDB/server.git mariadb
      - name: Configure MariaDB with external plugin
        run: |
          ./tools/configure_mariadb.sh \
            "${{ github.workspace }}/mariadb" \
            "${{ github.workspace }}/build-mariadb" \
            "${{ github.workspace }}/sdk-install" \
            -DCMAKE_BUILD_TYPE=Release \
            -DEXASOL_GW_PACKAGE_RPATH=ON \
            -DWITH_UNIT_TESTS=OFF \
            -DWITH_ROCKSDB=OFF \
            -DWITH_INNOBASE_STORAGE_ENGINE=OFF
      - name: Build plugin
        run: ./tools/build_plugin.sh "${{ github.workspace }}/build-mariadb" 2
      - name: Package and verify the installable plugin
        run: |
          plugin="${{ github.workspace }}/build-mariadb/storage/exasol_gw/ha_exasol_gw.so"
          sdk="${{ github.workspace }}/sdk-install/lib/libSessionGatewaySdk.so.0"
          arrow=$(ldd "$sdk" | awk '/libarrow\.so/ { print $3; exit }')
          test -f "$plugin"
          test -f "$sdk"
          test -n "$arrow" && test -f "$arrow"
          sdk_commit=$(git -C exasol-gateway-sdk rev-parse HEAD)
          ./tools/package_plugin.sh "$plugin" "$sdk" "$arrow" \
            "${{ github.workspace }}/dist" "${{ inputs.package_version }}" \
            "$MARIADB_VERSION" "$sdk_commit" "$PLATFORM" "$ARCH"
          archive=$(echo dist/*.tar.gz)
          checksum=$(echo dist/*.tar.gz.sha256)
          (cd dist && sha256sum --check "$(basename "$checksum")")
          mkdir extracted
          tar -xzf "$archive" -C extracted
          packaged_plugin=$(find extracted -name ha_exasol_gw.so -print -quit)
          test -n "$packaged_plugin"
          readelf -d "$packaged_plugin" | grep -F 'Library rpath: [$ORIGIN]'
          ldd "$packaged_plugin" | tee packaged-ldd.txt
          ! grep -F 'not found' packaged-ldd.txt
          ! readelf -d "$packaged_plugin" | grep -F "$GITHUB_WORKSPACE"
      - uses: actions/upload-artifact@v4
        with:
          name: mariadb-exasol-gateway-${{ env.MARIADB_VERSION }}-${{ env.PLATFORM }}-${{ env.ARCH }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    if: inputs.release_tag != ''
    needs: build-package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mariadb-exasol-gateway-11.4.9-ubuntu-24.04-amd64
          path: dist
      - name: Publish package release
        run: |
          prerelease=()
          if [[ "${{ inputs.release_tag }}" == *-* ]]; then prerelease=(--prerelease); fi
          gh release create "${{ inputs.release_tag }}" dist/* \
            --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes \
            --title "Exasol Gateway for MariaDB ${{ inputs.release_tag }}" "${prerelease[@]}"
